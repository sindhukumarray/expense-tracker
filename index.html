<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
  >
</head>

<body>

  <div class="container">
<header class="header">
  <div class="logo">

     <i class="ri-wallet-3-line"></i>

        <div>

    <div>
      <h1>Expense Tracker</h1>
      <p>Track your income and expenses</p>
    </div>

  </div>
  <button id="clearAll" class="clear-btn">
  <i class="ri-delete-bin-line"></i>
    Clear All
  </button>

</header>

<div class="main-layout">

<!-- LEFT card ke panal ke liye -->

<div class="left-panel">

<!-- FORM  ke liye hai-->

<div class="card">
<h2>Add Transaction</h2>
<form id="form">
<div class="form-group">
<label>Description</label>

<input type="text" id="text" placeholder="Enter description" required>

</div>
<div class="form-group">

<label>Amount</label>
<input type="number" id="amount" placeholder="+ income / - expense" required>

</div>

<button type="submit">
<i class="ri-add-line"></i> Add Transaction </button>

</form>
</div>

 <!--  some hint -->
<div class="card info-card">
<h3>💡 How to use?</h3>
<ol>
   <li>Enter description</li>
   <li>Enter amount</li>
   <li>+ for income</li>
   <li>- for expense</li>
</ol>

</div>
</div>

<!-- RIGHT side ke panal ke liye PANEL -->
<div class="right-panel">

<!-- SUMMARY -->
<div class="summary-wrapper"></div>
<div class="summary-grid">
<div class="summary-card balance-card">

    <h3>Balance</h3>
    <p id="balance">₹0.00</p>
</div>

<div class="summary-card income-card">

    <h3>Income</h3>
    <p id="income">₹0.00</p>

</div>

<div class="summary-card expense-card">

    <h3>Expense</h3>
    <p id="expense">₹0.00</p>

</div>

</div>

   <!-- TRANSACTIONS -->

<div class="card">

<div class="transaction-header">

    <h2>Transactions</h2>
</div>

    <ul id="transactions"></ul>

</div>
</div>
</div>
</div>

  <script src="script.js"></script>

</body>
</html>
