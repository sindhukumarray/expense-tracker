<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
</head>

<body>

 <div class="container">
<header class="header">
  <div class="logo">

     <i class="ri-wallet-3-line"></i>

        <div>

    <div>
      <h1>Expense Tracker</h1>
      <p>Track your income and expenses</p>
    </div>

  </div>
  <button id="clearAll" class="clear-btn">
  <i class="ri-delete-bin-line"></i>
    Clear All 
  </button>

</header>

<div class="main-layout">

<!-- LEFT card ke panal ke liye -->

<div class="left-panel">

<!-- FORM  ke liye hai-->

<div class="card">
<form id="form">
<h3 class="section-title">
Add Income
</h3>

<input
type="text"
id="text"
placeholder="Income Source (e.g, salary,business income..)"
/>

<input
type="number"
id="incomeAmount"
placeholder="Income Amount"
/>

<h3 class="section-title">
Add Expense
</h3>

<input
type="text"
id="expenseText"
placeholder="Expense Name (e.g, Food,Rent,Travel..)"
/>

<input
type="number"
id="expenseAmount"
placeholder="Expense Amount"
/>
<button type="submit" class="add-btn">
<i class="ri-add-line"></i> Add Transaction </button>

</form>
</div>
</div>

<!-- RIGHT side ke panal ke liye PANEL -->
<div class="right-panel">

<!-- SUMMARY -->
<div class="summary-grid">
<div class="summary-card balance-card">

    <h3>Balance</h3>
    <p id="balance">₹0.00</p>
</div>

<div class="summary-card income-card">

    <h3>Income</h3>
    <p id="income">₹0.00</p>

</div>

<div class="summary-card expense-card">

    <h3>Expense</h3>
    <p id="expense">₹0.00</p>

</div>

</div>

   <!-- TRANSACTIONS -->

<div class="card">

  <div class="transaction-header">
    <h2>Income Transactions</h2>
  </div>
  <ul id="incomeTransactions"></ul>
</div>

<div class="card">
  <div class="transaction-header">
    <h2>Expense Transactions</h2>
  </div>
  <ul id="expenseTransactions"></ul>
</div>
</div>

  <script src="script.js"></script>

</body>
</html>
